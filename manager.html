<!DOCTYPE html>
<html>
<body>
<h2>Inventory</h2>
<div id="inv"></div>

<script>
async function load() {
  const res = await fetch("https://restaurant-pos-backend-i88u.onrender.com/inventario");
  const data = await res.json();

  const container = document.getElementById("inv");
  container.innerHTML = "";

  data.forEach(i => {
    const d = document.createElement("div");
    d.innerText = i.nombre + " " + i.cantidad;
    container.appendChild(d);
  });
}

load();
</script>

</body>
</html>
