<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noir — Restaurant POS</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0906;
    --surface:   #12100d;
    --card:      #1a1712;
    --border:    #2e2a24;
    --border2:   #3d3830;
    --gold:      #c9a84c;
    --gold-dim:  #8a6e2f;
    --gold-glow: rgba(201,168,76,0.15);
    --cream:     #e8e0d0;
    --muted:     #7a7060;
    --red:       #c04a3a;
    --green:     #4a8c5c;
    --blue:      #3a6080;
    --amber:     #c07a2a;
    --font-display: 'Cormorant Garamond', serif;
    --font-mono:    'DM Mono', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: var(--font-mono);
    font-size: 13px;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content:'';
    position:fixed; inset:0; z-index:999; pointer-events:none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  /* ══════════════════════════════
     LOGIN SCREEN
  ══════════════════════════════ */
  #login-screen {
    position:fixed; inset:0; z-index:100;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at 50% 30%, #1e1a12 0%, #0a0906 70%);
    animation: fadeIn 0.6s ease;
  }

  .login-logo {
    font-family: var(--font-display);
    font-size: 72px;
    font-weight: 300;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-shadow: 0 0 60px rgba(201,168,76,0.3);
    margin-bottom: 8px;
  }
  .login-tagline {
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 0.5em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 64px;
  }
  .login-divider {
    width: 1px; height: 60px;
    background: linear-gradient(to bottom, transparent, var(--gold-dim), transparent);
    margin-bottom: 48px;
  }
  .role-grid {
    display:flex; gap:24px;
  }
  .role-btn {
    width: 180px; padding: 32px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    cursor: pointer; transition: all 0.3s;
    display:flex; flex-direction:column; align-items:center; gap:16px;
    position:relative; overflow:hidden;
  }
  .role-btn::before {
    content:'';
    position:absolute; inset:0;
    background: var(--gold-glow);
    opacity:0; transition: opacity 0.3s;
  }
  .role-btn:hover::before { opacity:1; }
  .role-btn:hover { border-color: var(--gold-dim); transform: translateY(-4px); }
  .role-icon {
    font-size: 32px;
    filter: grayscale(0.4);
  }
  .role-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: var(--cream);
    text-transform: uppercase;
  }
  .role-desc {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-align:center;
    line-height: 1.6;
  }
  .role-btn.active-role {
    border-color: var(--gold);
    box-shadow: 0 0 30px var(--gold-glow);
  }

  /* ══════════════════════════════
     APP SHELL
  ══════════════════════════════ */
  #app { display:none; height:100vh; flex-direction:column; }
  #app.visible { display:flex; animation: fadeIn 0.5s ease; }

  /* ── TOP BAR ── */
  .topbar {
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display:flex; align-items:center;
    padding: 0 20px;
    gap: 20px;
    flex-shrink: 0;
  }
  .topbar-logo {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: var(--gold);
  }
  .topbar-sep { width:1px; height:20px; background:var(--border); }
  .topbar-role {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .topbar-role span { color: var(--gold); }
  .topbar-time {
    margin-left:auto;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .topbar-logout {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .topbar-logout:hover { border-color: var(--gold-dim); color: var(--cream); }

  /* ── NAV TABS ── */
  .nav-tabs {
    height: 40px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display:flex; align-items:flex-end;
    padding: 0 20px;
    gap: 4px;
    flex-shrink: 0;
  }
  .tab-btn {
    padding: 8px 20px;
    background: transparent;
    border: 1px solid transparent;
    border-bottom: none;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: all 0.2s;
    position:relative; bottom:-1px;
  }
  .tab-btn:hover { color: var(--cream); }
  .tab-btn.active {
    background: var(--bg);
    border-color: var(--border);
    color: var(--gold);
  }

  /* ── MAIN CONTENT ── */
  .main { flex:1; overflow:hidden; display:flex; position:relative; }

  /* ── PANELS ── */
  .panel { display:none; width:100%; height:100%; }
  .panel.active { display:flex; }

  /* ══════════════════════════════
     FLOOR MAP (Hostess / Server)
  ══════════════════════════════ */
  .floor-panel {
    flex-direction: row;
  }
  .floor-left {
    flex:1; position:relative; overflow:hidden;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.03) 0%, transparent 50%),
      var(--bg);
  }

  /* Grid lines */
  .floor-left::before {
    content:'';
    position:absolute; inset:0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.3;
  }

  .floor-zones {
    position:absolute; inset:0; padding:40px;
    display:flex; flex-direction:column; gap:30px;
  }
  .zone-label {
    font-size: 9px;
    letter-spacing: 0.4em;
    color: var(--border2);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .table-row { display:flex; gap:20px; align-items:center; }

  /* TABLE NODES */
  .table-node {
    position:relative;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .table-node:hover { transform: scale(1.08); }
  .table-node:hover .table-shape { border-color: var(--gold) !important; }

  .table-shape {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    border: 1px solid var(--border2);
    transition: all 0.25s;
    position:relative;
  }
  .table-shape.square { width:70px; height:70px; }
  .table-shape.rect   { width:110px; height:70px; }
  .table-shape.round  { width:70px; height:70px; border-radius:50%; }
  .table-shape.large  { width:120px; height:80px; }

  .table-num {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 300;
    color: var(--cream);
  }
  .table-pax {
    font-size: 8px;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-top: 2px;
  }
  .table-time {
    position:absolute; bottom:-18px; left:50%; transform:translateX(-50%);
    font-size: 9px; color: var(--muted); white-space:nowrap;
    letter-spacing: 0.05em;
  }

  /* Table status colors */
  .t-free    .table-shape { background: rgba(74,140,92,0.12);  border-color: rgba(74,140,92,0.5); }
  .t-free    .table-num   { color: var(--green); }
  .t-seated  .table-shape { background: rgba(192,122,42,0.12); border-color: rgba(192,122,42,0.5); }
  .t-seated  .table-num   { color: var(--amber); }
  .t-ordered .table-shape { background: rgba(201,168,76,0.10); border-color: rgba(201,168,76,0.4); }
  .t-ordered .table-num   { color: var(--gold); }
  .t-check   .table-shape { background: rgba(58,96,128,0.15);  border-color: rgba(58,96,128,0.6); }
  .t-check   .table-num   { color: #6fa8cc; }
  .t-dirty   .table-shape { background: rgba(192,74,58,0.10);  border-color: rgba(192,74,58,0.4); }
  .t-dirty   .table-num   { color: var(--red); }

  /* ── FLOOR RIGHT SIDEBAR ── */
  .floor-right {
    width: 300px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display:flex; flex-direction:column;
    flex-shrink:0;
  }
  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--cream);
    margin-bottom: 4px;
  }
  .sidebar-sub {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Legend */
  .legend { padding: 16px 20px; border-bottom: 1px solid var(--border); display:flex; flex-wrap:wrap; gap:10px; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:9px; letter-spacing:0.1em; color:var(--muted); text-transform:uppercase; }
  .legend-dot { width:8px; height:8px; border-radius:50%; }
  .ld-free    { background:var(--green); }
  .ld-seated  { background:var(--amber); }
  .ld-ordered { background:var(--gold); }
  .ld-check   { background:#6fa8cc; }
  .ld-dirty   { background:var(--red); }

  /* Table detail */
  .table-detail {
    flex:1; padding:20px;
    overflow-y:auto;
  }
  .detail-empty {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-align:center;
    margin-top:40px;
    line-height:2;
  }
  .detail-table-num {
    font-family:var(--font-display);
    font-size:42px;
    font-weight:300;
    color:var(--gold);
    line-height:1;
    margin-bottom:4px;
  }
  .detail-status-badge {
    display:inline-block;
    padding: 3px 10px;
    font-size:9px;
    letter-spacing:0.25em;
    text-transform:uppercase;
    margin-bottom:20px;
  }
  .detail-info-row {
    display:flex; justify-content:space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size:11px;
    color:var(--muted);
  }
  .detail-info-row span:last-child { color:var(--cream); }

  .detail-order {
    margin-top: 16px;
  }
  .detail-order-title {
    font-size:9px; letter-spacing:0.25em; color:var(--muted);
    text-transform:uppercase; margin-bottom:10px;
  }
  .order-item {
    display:flex; justify-content:space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size:11px;
  }
  .order-item-name { color:var(--cream); }
  .order-item-price { color:var(--gold); }

  .detail-total {
    display:flex; justify-content:space-between;
    padding: 14px 0 0;
    font-family:var(--font-display);
    font-size:18px;
  }
  .detail-total-label { color:var(--muted); }
  .detail-total-val   { color:var(--gold); }

  .detail-actions { display:flex; flex-direction:column; gap:8px; margin-top:20px; }
  .btn {
    padding: 12px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--cream);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: all 0.2s;
    width:100%;
  }
  .btn:hover { background: var(--card); border-color: var(--border2); }
  .btn-gold   { border-color:var(--gold-dim); color:var(--gold); }
  .btn-gold:hover { background:var(--gold-glow); border-color:var(--gold); }
  .btn-green  { border-color:rgba(74,140,92,0.5); color:var(--green); }
  .btn-green:hover { background:rgba(74,140,92,0.1); }
  .btn-red    { border-color:rgba(192,74,58,0.4); color:var(--red); }
  .btn-red:hover { background:rgba(192,74,58,0.08); }

  /* ══════════════════════════════
     ORDER ENTRY (Server)
  ══════════════════════════════ */
  .order-panel { flex-direction:row; }

  .menu-section {
    flex:1; display:flex; flex-direction:column;
    overflow:hidden;
  }
  .menu-cats {
    display:flex; gap:0;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
    overflow-x:auto;
  }
  .cat-btn {
    padding: 12px 24px;
    background:transparent;
    border:none; border-right:1px solid var(--border);
    color:var(--muted);
    cursor:pointer;
    font-family:var(--font-mono);
    font-size:10px; letter-spacing:0.2em;
    text-transform:uppercase;
    white-space:nowrap;
    transition:all 0.2s;
  }
  .cat-btn:hover { color:var(--cream); background:var(--card); }
  .cat-btn.active { color:var(--gold); background:var(--card); border-bottom:1px solid var(--gold); }

  .menu-grid {
    flex:1; overflow-y:auto;
    display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    gap:1px; background:var(--border); padding:0;
    align-content:start;
  }
  .menu-item {
    background:var(--bg);
    padding: 20px 16px;
    cursor:pointer;
    transition:all 0.2s;
    display:flex; flex-direction:column; gap:6px;
    border:1px solid transparent;
  }
  .menu-item:hover { background:var(--card); border-color:var(--gold-dim); z-index:1; }
  .menu-item-name {
    font-family:var(--font-display);
    font-size:15px; font-weight:400;
    color:var(--cream); line-height:1.2;
  }
  .menu-item-desc { font-size:9px; color:var(--muted); line-height:1.5; letter-spacing:0.05em; }
  .menu-item-price { font-size:13px; color:var(--gold); margin-top:4px; }

  /* Ticket / Order sidebar */
  .ticket-sidebar {
    width:280px;
    background:var(--surface);
    border-left:1px solid var(--border);
    display:flex; flex-direction:column;
    flex-shrink:0;
  }
  .ticket-header {
    padding:16px 20px;
    border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
  }
  .ticket-title {
    font-family:var(--font-display);
    font-size:16px;
    color:var(--cream);
  }
  .ticket-table-badge {
    font-size:10px; letter-spacing:0.1em;
    color:var(--gold);
    border:1px solid var(--gold-dim);
    padding:3px 10px;
  }
  .ticket-items {
    flex:1; overflow-y:auto; padding:16px 20px;
  }
  .ticket-item {
    display:flex; align-items:center; gap:10px;
    padding:8px 0; border-bottom:1px solid var(--border);
  }
  .ticket-qty {
    display:flex; align-items:center; gap:6px;
  }
  .qty-btn {
    width:20px; height:20px;
    background:var(--card); border:1px solid var(--border2);
    color:var(--cream); cursor:pointer; font-size:12px;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.15s;
  }
  .qty-btn:hover { border-color:var(--gold-dim); color:var(--gold); }
  .qty-val { width:20px; text-align:center; font-size:12px; }
  .ticket-item-name { flex:1; font-size:11px; color:var(--cream); }
  .ticket-item-price { font-size:11px; color:var(--gold); }
  .ticket-item-del { background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; padding:0 2px; }
  .ticket-item-del:hover { color:var(--red); }

  .ticket-subtotals {
    padding:16px 20px;
    border-top:1px solid var(--border);
  }
  .subtotal-row {
    display:flex; justify-content:space-between;
    padding:4px 0; font-size:11px; color:var(--muted);
  }
  .subtotal-row.total {
    font-family:var(--font-display);
    font-size:20px; color:var(--cream);
    padding-top:10px; margin-top:6px;
    border-top:1px solid var(--border2);
  }
  .subtotal-row.total span:last-child { color:var(--gold); }

  .ticket-actions { padding:16px 20px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:8px; }

  .table-selector {
    display:flex; gap:6px; flex-wrap:wrap; padding:12px 20px; border-bottom:1px solid var(--border);
  }
  .tsel-btn {
    padding:4px 10px;
    background:var(--card); border:1px solid var(--border);
    color:var(--muted); cursor:pointer;
    font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em;
    transition:all 0.2s;
  }
  .tsel-btn:hover { border-color:var(--gold-dim); color:var(--cream); }
  .tsel-btn.active { border-color:var(--gold); color:var(--gold); }

  /* ══════════════════════════════
     MANAGER DASHBOARD
  ══════════════════════════════ */
  .manager-panel {
    display:none; flex-direction:column;
    overflow-y:auto; padding:30px;
    gap:24px;
  }
  .manager-panel.active { display:flex; }

  .mgr-row { display:flex; gap:20px; }
  .mgr-card {
    background:var(--surface);
    border:1px solid var(--border);
    padding:24px;
    flex:1;
    position:relative; overflow:hidden;
  }
  .mgr-card::after {
    content:'';
    position:absolute; top:0; left:0; right:0;
    height:2px;
    background:linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }
  .mgr-card-label {
    font-size:9px; letter-spacing:0.3em; color:var(--muted); text-transform:uppercase; margin-bottom:8px;
  }
  .mgr-card-value {
    font-family:var(--font-display); font-size:36px; font-weight:300; color:var(--gold);
    line-height:1;
  }
  .mgr-card-sub { font-size:10px; color:var(--muted); margin-top:6px; letter-spacing:0.1em; }
  .mgr-card-trend { 
    position:absolute; top:24px; right:24px;
    font-size:11px; letter-spacing:0.05em;
  }
  .trend-up   { color:var(--green); }
  .trend-down { color:var(--red); }

  .mgr-section-title {
    font-family:var(--font-display); font-size:20px; font-weight:400;
    letter-spacing:0.1em; color:var(--cream);
    padding-bottom:10px;
    border-bottom:1px solid var(--border);
  }

  /* Sales chart */
  .chart-bar-wrap { display:flex; align-items:flex-end; gap:6px; height:120px; padding-top:16px; }
  .chart-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
  .chart-bar {
    width:100%; background:linear-gradient(to top, var(--gold-dim), var(--gold));
    border-radius:1px 1px 0 0; min-height:4px;
    position:relative; transition:all 0.4s ease;
    cursor:pointer;
  }
  .chart-bar:hover { filter:brightness(1.3); }
  .chart-bar-tooltip {
    display:none;
    position:absolute; bottom:calc(100% + 4px); left:50%; transform:translateX(-50%);
    background:var(--card); border:1px solid var(--border2); padding:4px 8px;
    font-size:9px; white-space:nowrap; color:var(--cream); letter-spacing:0.05em;
    z-index:10;
  }
  .chart-bar:hover .chart-bar-tooltip { display:block; }
  .chart-lbl { font-size:8px; color:var(--muted); letter-spacing:0.1em; }

  /* Staff table */
  .staff-table { width:100%; border-collapse:collapse; }
  .staff-table th {
    text-align:left; padding:10px 12px;
    font-size:9px; letter-spacing:0.25em; color:var(--muted); text-transform:uppercase;
    border-bottom:1px solid var(--border);
  }
  .staff-table td {
    padding:10px 12px; font-size:11px; color:var(--cream);
    border-bottom:1px solid var(--border);
  }
  .staff-table tr:last-child td { border-bottom:none; }
  .staff-table tr:hover td { background:var(--card); }
  .status-pill {
    display:inline-block; padding:2px 10px;
    font-size:8px; letter-spacing:0.15em; text-transform:uppercase;
    border-radius:0;
  }
  .pill-on  { background:rgba(74,140,92,0.15); color:var(--green); border:1px solid rgba(74,140,92,0.3); }
  .pill-off { background:rgba(122,112,96,0.1); color:var(--muted); border:1px solid var(--border); }

  /* Recent orders */

  container.appendChild(panel);

function buildMenuCats() {
  const el = document.getElementById('menu-cats');
  if (!el) return;
  el.innerHTML = Object.keys(MENU).map(cat => `
    <button class="cat-btn ${cat === menuCat ? 'active' : ''}" onclick="changeCat('${cat}')">${cat}</button>
  `).join('');
}

function changeCat(cat) {
  menuCat = cat;
  buildMenuCats();
  buildMenuGrid(cat);
}

function buildMenuGrid(cat) {
  const el = document.getElementById('menu-grid');
  if (!el) return;
  el.innerHTML = MENU[cat].map(item => `
    <div class="menu-item" onclick="addToOrder('${item.name}',${item.price})">
      <div class="menu-item-name">${item.name}</div>
      <div class="menu-item-desc">${item.desc}</div>
      <div class="menu-item-price">$${item.price.toLocaleString()}</div>
    </div>`).join('');
}

function addToOrder(name, price) {
  const existing = orderItems.find(i => i.name === name);
  if (existing) { existing.qty++; }
  else { orderItems.push({name, price, qty:1}); }
  buildTicket();
  toast(`${name} added`);
}

function buildTableSelector() {
  const el = document.getElementById('table-selector');
  if (!el) return;
  el.innerHTML = TABLES.map(t => `
    <button class="tsel-btn ${t.id === orderTableId ? 'active' : ''}" onclick="setOrderTable(${t.id})">${t.id}</button>
  `).join('');
}

function setOrderTable(id) {
  orderTableId = id;
  document.getElementById('ticket-table-badge').textContent = `Table ${id}`;
  buildTableSelector();
}

function buildTicket() {
  const el = document.getElementById('ticket-items');
  const st = document.getElementById('ticket-subtotals');
  if (!el || !st) return;

  if (orderItems.length === 0) {
    el.innerHTML = `<div style="color:var(--muted);font-size:11px;text-align:center;margin-top:30px;letter-spacing:0.1em">— Empty ticket —</div>`;
  } else {
    el.innerHTML = orderItems.map((item, i) => `
      <div class="ticket-item">
        <div class="ticket-qty">
          <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
          <span class="qty-val">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
        </div>
        <div class="ticket-item-name">${item.name}</div>
        <div class="ticket-item-price">$${(item.price * item.qty).toLocaleString()}</div>
        <button class="ticket-item-del" onclick="removeItem(${i})">✕</button>
      </div>`).join('');
  }

  const sub = orderItems.reduce((s,i) => s + i.price * i.qty, 0);
  const tax = Math.round(sub * 0.16);
  const tip = Math.round(sub * 0.15);
  const total = sub + tax;

  st.innerHTML = `
    <div class="subtotal-row"><span>Subtotal</span><span>$${sub.toLocaleString()}</span></div>
    <div class="subtotal-row"><span>IVA (16%)</span><span>$${tax.toLocaleString()}</span></div>
    <div class="subtotal-row"><span>Suggested Tip (15%)</span><span>$${tip.toLocaleString()}</span></div>
    <div class="subtotal-row total"><span>Total</span><span>$${total.toLocaleString()}</span></div>`;
}

function changeQty(idx, delta) {
  orderItems[idx].qty += delta;
  if (orderItems[idx].qty <= 0) orderItems.splice(idx, 1);
  buildTicket();
}
function removeItem(idx) {
  orderItems.splice(idx, 1);
  buildTicket();
}
function sendToKitchen() {
  if (orderItems.length === 0) { toast('Ticket is empty'); return; }
  toast(`Order sent to kitchen — Table ${orderTableId}`);
  orderItems = [];
  buildTicket();
}
function printTicket() { toast('Ticket printed'); }
function voidTicket() { orderItems = []; buildTicket(); toast('Ticket voided'); }
