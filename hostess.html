<!DOCTYPE html>
<html>
<body>

<h2>Tables</h2>

<div id="floor" style="position:relative; width:600px; height:400px; border:1px solid #ccc;"></div>

<script>
const API = "https://restaurant-pos-backend-i88u.onrender.com";

const posiciones = {
  1:{x:50,y:50},
  2:{x:150,y:50},
  3:{x:250,y:50},
  4:{x:350,y:50},
  5:{x:450,y:50},
  6:{x:50,y:150},
  7:{x:150,y:150},
  8:{x:250,y:150},
  9:{x:350,y:150},
  10:{x:450,y:150}
};

async function cargarMesas(){
  const res = await fetch(`${API}/mesas`);
  const mesas = await res.json();

  const floor = document.getElementById("floor");
  floor.innerHTML = "";

  mesas.forEach(m => {

    const pos = posiciones[m.numero] || {x:0,y:0}; // safety fix

    const d = document.createElement("div");
    d.innerText = m.numero;

    d.style.position = "absolute";
    d.style.left = pos.x + "px";
    d.style.top = pos.y + "px";

    d.style.width = "60px";
    d.style.height = "60px";
    d.style.display = "flex";
    d.style.alignItems = "center";
    d.style.justifyContent = "center";
    d.style.color = "white";
    d.style.cursor = "pointer";
    d.style.borderRadius = "10px";

    d.style.background =
      m.estado === "Disponible" ? "green" :
      m.estado === "Ocupada" ? "red" :
      "blue";

    d.onclick = () => {
      window.location.href = `server.html?mesa=${m.id_mesa}`;
    };

    floor.appendChild(d);
  });
}

cargarMesas();
</script>

</body>
</html>
