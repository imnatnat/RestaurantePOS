<!DOCTYPE html>
<html>
<body>
<h2>Orders</h2>
<div id="menu"></div>
<ul id="orden"></ul>
<button onclick="splitBill()">Split</button>
<p id="total"></p>

<script>
let orden=[];
async function cargarMenu(){
 const res=await fetch("https://YOUR_BACKEND_URL/menu");
 const data=await res.json();
 data.forEach(i=>{
   const b=document.createElement("button");
   b.innerText=i.nombre;
   b.onclick=()=>{
     let nivel=prompt("Spicy level 1-5")||0;
     orden.push({...i,nivel});
     render();
   };
   document.getElementById("menu").appendChild(b);
 });
}

function render(){
 const ul=document.getElementById("orden");
 ul.innerHTML="";
 let total=0;
 orden.forEach(o=>{
   total+=parseFloat(o.precio);
   const li=document.createElement("li");
   li.innerText=o.nombre+" 🌶️"+o.nivel;
   ul.appendChild(li);
 });
 document.getElementById("total").innerText="Total: "+total;
}

function splitBill(){
 const p=prompt("People?");
 const t=orden.reduce((s,o)=>s+parseFloat(o.precio),0);
 alert("Each: "+(t/p).toFixed(2));
}

cargarMenu();
</script>
</body>
</html>
